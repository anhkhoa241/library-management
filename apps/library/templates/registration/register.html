{% extends 'base.html' %}
{% block title %}Đăng ký độc giả{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-3"><i class="fas fa-user-plus me-2"></i>Đăng ký độc giả</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100 rounded-pill">Đăng ký</button>
                </form>
                <p class="text-center mt-3 small">Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
