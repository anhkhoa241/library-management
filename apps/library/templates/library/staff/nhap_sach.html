{% extends 'base.html' %}
{% block title %}Nhập sách vào kho{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="fas fa-dolly-flatbed me-2"></i>Nhập sách mới</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="text-danger small">{{ field.errors|striptags }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-success rounded-pill"><i class="fas fa-plus-circle"></i> Nhập kho</button>
        </form>
    </div>
</div>
{% endblock %}
